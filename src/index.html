<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习计时器</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <!-- Noise texture overlay -->
    <div class="noise-overlay"></div>
    
    <!-- Title Bar -->
    <div class="title-bar" data-tauri-drag-region>
      <div class="title-bar-text">
        <span class="title-label">focus</span>
      </div>
      <div class="title-bar-controls">
        <button class="control-btn minimize" id="minimizeBtn" aria-label="最小化">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
            <line x1="2" y1="6" x2="10" y2="6"/>
          </svg>
        </button>
        <button class="control-btn close" id="closeBtn" aria-label="关闭">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
            <line x1="3" y1="3" x2="9" y2="9"/>
            <line x1="9" y1="3" x2="3" y2="9"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Timer Display -->
      <div class="timer-section">
        <div class="timer-ring">
          <svg class="progress-ring" width="160" height="160" viewBox="0 0 160 160">
            <defs>
              <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#8fa98f"/>
                <stop offset="100%" stop-color="#a3b89c"/>
              </linearGradient>
            </defs>
            <circle class="progress-ring-bg" cx="80" cy="80" r="70"/>
            <circle class="progress-ring-progress" cx="80" cy="80" r="70" id="progressCircle"/>
          </svg>
          <div class="timer-display">
            <span class="time" id="timerDisplay">00:00:00</span>
            <span class="time-label" id="timeLabel">ready</span>
          </div>
        </div>
      </div>

      <!-- Subject Input -->
      <div class="subject-section">
        <label for="subjectInput" class="subject-label">subject</label>
        <input type="text" id="subjectInput" placeholder="输入科目名称" value="学习" aria-label="学习科目">
      </div>

      <!-- Controls -->
      <div class="controls-section">
        <button class="control-btn-main start" id="startBtn" aria-label="开始">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="6,4 20,12 6,20"/>
          </svg>
        </button>
        <button class="control-btn-main pause" id="pauseBtn" disabled aria-label="暂停">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <rect x="5" y="4" width="4" height="16"/>
            <rect x="15" y="4" width="4" height="16"/>
          </svg>
        </button>
        <button class="control-btn-main stop" id="stopBtn" disabled aria-label="停止">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <rect x="4" y="4" width="16" height="16" rx="2"/>
          </svg>
        </button>
      </div>

      <!-- Stats -->
      <div class="stats-section">
        <div class="stat-item">
          <span class="stat-label">today</span>
          <span class="stat-value" id="todayTotal">0h 0m</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-label">total</span>
          <span class="stat-value" id="allTotal">0h 0m</span>
        </div>
      </div>

      <!-- History Toggle -->
      <button class="history-toggle" id="historyToggle" aria-label="展开历史记录" aria-expanded="false">
        <span class="history-label">history</span>
        <svg class="toggle-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      <!-- History Panel -->
      <div class="history-panel" id="historyPanel" role="region" aria-label="历史记录">
        <div class="history-list" id="historyList">
          <div class="history-empty">no records yet</div>
        </div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
